name: qrsnap
description: QRSnap - QR Code Scanner & Generator. Does one thing. Has no ads. Forever free.
publish_to: 'none'
version: 1.0.1+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  flutter_riverpod: ^2.4.0
  mobile_scanner: ^3.5.6
  qr_flutter: ^4.1.0
  google_fonts: ^6.1.0
  flutter_animate: ^4.3.0
  iconsax: ^0.0.8
  gap: ^3.0.1
  shared_preferences: ^2.2.2
  share_plus: ^7.2.2
  lottie: ^2.7.0
  smooth_page_indicator: ^1.1.0
  path_provider: ^2.1.2
  permission_handler: ^11.3.1
  url_launcher: ^6.2.5
  image_picker: ^1.0.7
  printing: ^5.12.0
  pdf: ^3.11.0
  gal: ^1.2.0
  open_filex: ^4.5.0
  flutter_colorpicker: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/lottie/scan_success.json
    - assets/lottie/empty_history.json
